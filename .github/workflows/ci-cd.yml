name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repo
      uses: actions/checkout@v3

    - name: Instalar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt

    - name: Ejecutar pruebas
      run: |
        pytest

    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build imagen Docker
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/hola-mundo-devops .

    - name: Push a DockerHub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/hola-mundo-devops

    - name: Deploy en Render
      run: |
        curl -X POST "https://api.render.com/deploy/srv-XXXX?key=${{ secrets.RENDER_API_KEY }}"